        * {

        body {
            height: 100vh;

            position: relative;
            overflow: hidden;
            text-align: center;

        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 60% 40%, rgba(255,255,255,0.6) 1px, transparent 0),

            background-size: 250px 250px, 130px 130px;
            animation: twinkle2 12s infinite alternate ease-in-out;
            opacity: 0.45;
            pointer-events: none;
        }

            0% { opacity: 0.65; }
            100% { opacity: 0.95; }
