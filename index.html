<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X_LMNR • Under Construction</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(180deg, #1e0033 0%, #0a001f 40%, #000011 100%);
            color: #f0e6ff;
            font-family: 'Orbitron', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        /* Deep space purple starry background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.9) 1px, transparent 0),
                radial-gradient(circle at 45% 70%, rgba(255,255,255,0.7) 1px, transparent 0),
                radial-gradient(circle at 70% 25%, rgba(255,255,255,0.85) 1px, transparent 0),
                radial-gradient(circle at 10% 80%, rgba(168, 85, 247, 0.6) 1.5px, transparent 0),
                radial-gradient(circle at 85% 60%, rgba(255,255,255,0.75) 1px, transparent 0),
                radial-gradient(circle at 35% 15%, rgba(168, 85, 247, 0.5) 2px, transparent 0);
            background-size: 140px 140px, 190px 190px, 110px 110px, 170px 170px, 220px 220px, 95px 95px;
            animation: twinkle 8s infinite alternate ease-in-out;
            opacity: 0.75;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 60% 40%, rgba(255,255,255,0.6) 1px, transparent 0),
                radial-gradient(circle at 15% 55%, rgba(168, 85, 247, 0.7) 1.2px, transparent 0);
            background-size: 250px 250px, 130px 130px;
            animation: twinkle2 12s infinite alternate ease-in-out;
            opacity: 0.45;
            pointer-events: none;
        }

        @keyframes twinkle {
            0% { opacity: 0.65; }
            100% { opacity: 0.95; }
        }

        @keyframes twinkle2 {
            0% { opacity: 0.35; }
            100% { opacity: 0.65; }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 820px;
            padding: 40px 20px;
        }

        /* Thumbnail - Top Left Corner */
        .thumbnail {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 6px solid #c084fc;
            box-shadow: 
                0 0 30px #c084fc,
                0 0 60px rgba(192, 132, 252, 0.7);
            overflow: hidden;
            z-index: 3;
            background: #2c003e;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .thumbnail:hover img {
            transform: scale(1.08);
        }

        /* Central Logo */
        .logo {
            width: 320px;
            height: 320px;
            margin: 0 auto 40px;
            filter: drop-shadow(0 0 60px #c084fc);
        }

        h1 {
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 16px;
            text-shadow: 
                0 0 15px #c084fc,
                0 0 35px #c084fc,
                0 0 55px rgba(192, 132, 252, 0.6);
            animation: glow 3s ease-in-out infinite alternate;
        }

        p {
            font-size: 1.35rem;
            max-width: 620px;
            margin: 0 auto 40px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .x-button {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: linear-gradient(90deg, #c084fc, #a855f7);
            color: #12002e;
            font-size: 1.45rem;
            font-weight: 700;
            padding: 18px 48px;
            border-radius: 9999px;
            text-decoration: none;
            box-shadow: 
                0 0 30px #c084fc,
                0 10px 30px rgba(168, 85, 247, 0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .x-button:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 
                0 0 50px #c084fc,
                0 20px 40px rgba(168, 85, 247, 0.6);
        }

        .footer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            opacity: 0.7;
            z-index: 2;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.8rem; letter-spacing: 4px; }
            .logo { width: 240px; height: 240px; }
            .thumbnail { width: 90px; height: 90px; top: 25px; left: 25px; }
        }
    </style>
</head>
<body>

    <!-- YOUR LOGO AS THUMBNAIL -->
    <div class="thumbnail">
        <img src="xLMNR.jpg" alt="X_LMNR Logo">
    </div>

    <div class="container">

        <!-- Central Logo -->
        <div class="logo">
            <svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="160" cy="160" r="148" stroke="#c084fc" stroke-width="18" stroke-opacity="0.4"/>
                <circle cx="160" cy="160" r="130" fill="#4b0082"/>
                <circle cx="160" cy="160" r="98" fill="none" stroke="#e0bbff" stroke-width="12" stroke-opacity="0.35"/>
                <circle cx="160" cy="160" r="72" fill="none" stroke="#a855f7" stroke-width="8"/>
                <text x="160" y="175" font-family="Orbitron" font-size="52" font-weight="700" fill="#f0e6ff" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">X_LMNR</text>
                <text x="160" y="105" font-size="38" fill="#f0e6ff" text-anchor="middle" dominant-baseline="middle">𝕏</text>
            </svg>
        </div>

        <h1>UNDER CONSTRUCTION</h1>
        <p>We're crafting something cosmic.<br>Lumenaire V2 incoming, stay tuned and get ready for the 1:1 swap!...</p>

        <a href="https://x.com/X_LMNR" target="_blank" class="x-button">
            <span>𝕏</span>
            FOLLOW @X_LMNR
        </a>

    </div>

    <div class="footer">
        © X_LMNR • Coming soon to the universe
    </div>

</body>
</html>
